name: CI

on:
  push:
    branches: ["*"]
  pull_request:

permissions:
  contents: read

# Cancel in-flight runs of the same ref when a new push lands. Keeps PR
# feedback snappy and avoids paying for stale builds.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # `test` runs on every push / PR. No -race here — race detection is
  # 2-10x slower and the slow path runs in `test-race` below, gated to
  # master / direct pushes so feature-branch feedback stays fast.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  # Full race-detector pass — only on master to keep PR turnaround fast.
  # If a PR introduces a race, master will catch it and the fix lands as
  # a follow-up. Worth the trade for sub-minute PR feedback.
  test-race:
    name: Test (race)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Test (race)
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m

  # govulncheck runs on master only. Pulled out of the per-PR loop
  # because (a) `go install ...@latest` re-downloads the binary on
  # every run, and (b) the scan does dep-graph traversal work that
  # doesn't change between commits on the same branch. Pinning a
  # tagged version makes the build cache for the binary stable across
  # runs.
  govulncheck:
    name: govulncheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...
